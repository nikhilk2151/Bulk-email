[variables]
PATH = "/opt/venv/bin:$PATH"

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt"
]

[start]
cmd = "/opt/venv/bin/uvicorn app:app --host :: --port $PORT --proxy-headers --forwarded-allow-ips='*'"
